      (function() {
        try {
          var d = document.documentElement,
            c = d.classList;

          if (e === 'dark') {
            d.style.colorScheme = 'dark';
            c.remove('light');
            c.add('dark');
            // localStorage.setItem('theme', 'dark');
          } else {
            d.style.colorScheme = 'light';

            // localStorage.setItem('theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
